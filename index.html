function maakSpelers(sys){const s=SYSTEMEN[sys]||SYSTEMEN["1-4-3-3"];const l=[];["doelman","verdediger","middenvelder","aanvaller"].forEach(p=>{for(let i=0;i<s[p];i++)l.push({positie:p,naam:"",land:"",stats:{}});});l.push({positie:"coach",naam:"",land:"",stats:{}});return l;}
function calcPoints(s){const sc=POINTS[s.positie];if(!sc)return 0;return STATS.reduce((sum,stat)=>{const v=(s.stats&&s.stats[stat])||0;const p=sc[stat];return typeof p==="number"?sum+v*p:sum;},0);}

function RanglijstTab({deelnemers,isAdmin}){
  const [expandId,setExpandId]=useState(null);

  function groep(sp){const g={};(sp||[]).forEach(s=>{if(!g[s.positie])g[s.positie]=[];g[s.positie].push(s);});return g;}

  // Koppel spelers foto aan land

                <div style={{position:"relative",zIndex:1}}>
                  <div style={{fontSize:isFirst?38:28,marginBottom:4}}>{medal}</div>
                  <div style={{fontWeight:700,fontSize:isFirst?15:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.naam}</div>

        const gr=groep(d.spelers);
        const teamSpeler=(d.spelers||[]).find(s=>LAND_FOTO[s.land]);
        function LAND_FOTO_local(land){return {"Nederland":IMG("virgil-removebg-preview.png"),"Argentinie":IMG("messi_2.0-removebg-preview.png"),"Frankrijk":IMG("mbappe-removebg-preview.png"),"Portugal":IMG("ronadlo-removebg-preview.png"),"Spanje":IMG("yamal-removebg-preview.png"),"Senegal":IMG("Mane-removebg-preview.png"),"Marokko":IMG("hakimi-removebg-preview.png"),"Brazilie":IMG("paquetta-removebg-preview.png"),"Curacao":IMG("bacuna-removebg-preview.png")}[land];}

                {["doelman","verdediger","middenvelder","aanvaller","coach"].map(pos=>{const sp=gr[pos];if(!sp||!sp.length)return null;return(
                  <div key={pos} style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:POS_COLOR[pos],textTransform:"uppercase",letterSpacing:2,marginBottom:6,fontWeight:700}}>{pos}</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:6}}>
                      {sp.map((s,si)=>{
                        const foto=LAND_FOTO_local(s.land);
                        return(
                          <div key={si} style={{background:"#111",borderRadius:8,padding:"8px 10px",border:"1px solid #1a1a1a",position:"relative",overflow:"hidden"}}>
                            {foto&&<img src={foto} style={{position:"absolute",right:-8,bottom:0,height:"80%",objectFit:"contain",opacity:0.15}} alt=""/>}
                            <div style={{position:"relative",zIndex:1}}>
                              <div style={{fontWeight:600,fontSize:13}}>{s.naam||"-"}</div>
                              <div style={{fontSize:11,color:"#444",marginBottom:4}}>{s.land||""}</div>
                              <div className="bebas" style={{fontSize:18,color:ORANJE,letterSpacing:1}}>{calcPoints(s)} pt</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );})}
              </div>
            )}
          </div>
        );
      })}
      {sorted.length===0&&<div style={{color:"#333",textAlign:"center",padding:60}}>Nog geen deelnemers ingeschreven.</div>}
    </div>
  );
}

function Inschrijfformulier({onInschrijven}){
  const [form,setForm]=useState({naam:"",teamnaam:"",email:"",systeem:"1-4-3-3",spelers:maakSpelers("1-4-3-3")});
  const [stap,setStap]=useState(1);const [bezig,setBezig]=useState(false);const [fout,setFout]=useState("");
  function setSys(sys){setForm({...form,systeem:sys,spelers:maakSpelers(sys)});}
  function setSpeler(si,f,v){const sp=[...form.spelers];sp[si]={...sp[si],[f]:v};setForm({...form,spelers:sp});}
  const gLanden=form.spelers.filter(s=>s.land).map(s=>s.land);
  async function versturen(){
    const lege=form.spelers.filter(s=>!s.naam.trim()||!s.land.trim());
    if(lege.length>0){setFout("Vul alle spelers en landen in.");return;}
    const landen=form.spelers.map(s=>s.land);if(new Set(landen).size!==landen.length){setFout("Je hebt een land dubbel gebruikt!");return;}
    setBezig(true);setFout("");
    try{const n=await dbToevoegen("deelnemers",{naam:form.naam,teamnaam:form.teamnaam,email:form.email,systeem:form.systeem,spelers:JSON.stringify(form.spelers)});
    if(n&&n.id){setStap(3);onInschrijven();}else setFout("Er ging iets mis.");}
    catch(e){setFout("Verbindingsfout.");}setBezig(false);
  }
  if(deadlineVerstreken())return(<div style={{textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:16}}>🔒</div><div className="bebas" style={{fontSize:28,color:ORANJE,marginBottom:8}}>Inschrijving gesloten</div><div style={{color:"#666",fontSize:14}}>{formatDeadline()}</div></div>);
  if(stap===3)return(
    <div style={{textAlign:"center",padding:60,position:"relative",overflow:"hidden"}}>
      <img src={IMG("world_cup-removebg-preview.png")} style={{position:"absolute",right:-20,bottom:-20,height:200,opacity:0.1}} alt=""/>
      <div style={{fontSize:56,marginBottom:16}}>🎉</div>
      <div className="bebas" style={{fontSize:32,color:ORANJE,marginBottom:8}}>Ingeschreven!</div>
      <div style={{color:"#aaa",fontSize:14}}>Succes {form.naam}! Je team staat klaar voor het WK.</div>
    </div>
  );
  return(
    <div style={{maxWidth:600,margin:"0 auto"}}>
      {/* Sfeerband */}
      <div style={{position:"relative",borderRadius:12,overflow:"hidden",marginBottom:24,background:"#111",border:"1px solid #222",padding:"16px 20px",display:"flex",alignItems:"center",gap:16}}>
        <img src={IMG("world_cup-removebg-preview.png")} style={{height:60,objectFit:"contain",flexShrink:0,filter:`drop-shadow(0 0 8px ${ORANJE}66)`}} alt=""/>
        <div>
          <div className="bebas" style={{fontSize:20,color:ORANJE,letterSpacing:2}}>Schrijf je in!</div>
          <div style={{fontSize:13,color:"#555"}}>Stel je droomteam samen · deadline {formatDeadline()}</div>
        </div>
        <img src={IMG("virgil-removebg-preview.png")} style={{position:"absolute",right:-10,bottom:0,height:"100%",objectFit:"contain",opacity:0.1}} alt=""/>
      </div>

      <div style={{display:"flex",gap:0,marginBottom:24,borderRadius:10,overflow:"hidden",border:"1px solid #222"}}>
        {["1. Gegevens","2. Spelers"].map((l,i)=>(<div key={i} style={{flex:1,padding:"12px 0",textAlign:"center",fontSize:13,fontWeight:700,background:stap===i+1?ORANJE:"#111",color:stap===i+1?"#fff":"#444",borderRight:i===0?"1px solid #222":"none"}}>{l}</div>))}
      </div>

      {stap===1&&(<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div><div style={{fontSize:12,color:"#666",marginBottom:5}}>Naam *</div><input placeholder="Jan Janssen" value={form.naam} onChange={e=>setForm({...form,naam:e.target.value})} style={IS}/></div>
          <div><div style={{fontSize:12,color:"#666",marginBottom:5}}>Team naam *</div><input placeholder="De Oranjeboys" value={form.teamnaam} onChange={e=>setForm({...form,teamnaam:e.target.value})} style={IS}/></div>
        </div>
        <div style={{marginBottom:20}}><div style={{fontSize:12,color:"#666",marginBottom:5}}>E-mail *</div><input placeholder="jouw@email.nl" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} style={IS}/></div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12,color:"#666",marginBottom:10}}>Spelsysteem *</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {Object.keys(SYSTEMEN).map(sys=>(<button key={sys} onClick={()=>setSys(sys)} style={{padding:"14px 0",border:`2px solid ${form.systeem===sys?ORANJE:"#222"}`,background:form.systeem===sys?`${ORANJE}22`:"#111",color:form.systeem===sys?ORANJE:"#555",borderRadius:10,fontWeight:800,fontSize:17}}>{sys}</button>))}
          </div>
        </div>
        <button onClick={()=>{if(!form.naam.trim()||!form.teamnaam.trim()||!form.email.trim()){setFout("Vul alle velden in.");return;}setFout("");setStap(2);}} style={{...BG,width:"100%",marginTop:16,padding:"13px 0",fontSize:15}}>Volgende</button>
        {fout&&<div style={{color:"#ef4444",fontSize:13,marginTop:10,textAlign:"center"}}>{fout}</div>}
      </div>)}

      {stap===2&&(<div>
        <div style={{marginBottom:16,padding:12,background:"#1a1a1a",borderRadius:8,border:"1px solid #222",fontSize:13,color:"#aaa"}}>Kies <strong style={{color:"#fff"}}>1 speler per land</strong>. Elk land mag maar 1x voorkomen.</div>
        {form.spelers.map((s,si)=>(<div key={si} style={{marginBottom:10,background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><PosBadge positie={s.positie}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>Land</div>
              <select value={s.land} onChange={e=>setSpeler(si,"land",e.target.value)} style={{...IS,fontSize:13}}>
                <option value="">Kies land...</option>
                {WK_LANDEN.map(l=>(<option key={l} value={l} disabled={gLanden.includes(l)&&s.land!==l}>{gLanden.includes(l)&&s.land!==l?"(bezet) ":""}{l}</option>))}
              </select>
            </div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:4}}>{s.positie==="coach"?"Coach":"Speler"}</div><input placeholder={s.positie==="coach"?"bijv. Koeman":"bijv. Van Dijk"} value={s.naam} onChange={e=>setSpeler(si,"naam",e.target.value)} style={IS}/></div>
          </div>
        </div>))}
        {fout&&<div style={{color:"#ef4444",fontSize:13,marginTop:8,marginBottom:8,textAlign:"center",padding:"10px",background:"#ef444422",borderRadius:8}}>{fout}</div>}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={()=>{setFout("");setStap(1);}} style={{...BX,flexShrink:0}}>Terug</button>
          <button onClick={versturen} disabled={bezig} style={{...BG,flex:1,padding:"13px 0",fontSize:15,opacity:bezig?0.7:1}}>{bezig?"Bezig...":"Team inschrijven"}</button>
        </div>
      </div>)}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("ranglijst");
  const [deelnemers,setDeelnemers]=useState([]);
  const [laden,setLaden]=useState(true);
  const [opslaan,setOpslaan]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [toonLogin,setToonLogin]=useState(false);
  const [wachtwoord,setWachtwoord]=useState("");
  const [loginFout,setLoginFout]=useState(false);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState(null);

  useEffect(()=>{laadData();},[]);
  async function laadData(){setLaden(true);const data=await dbLees("deelnemers");setDeelnemers(data.map(d=>({...d,spelers:typeof d.spelers==="string"?JSON.parse(d.spelers):(d.spelers||[])})));setLaden(false);}
  function login(){if(wachtwoord===ADMIN_WACHTWOORD){setIsAdmin(true);setToonLogin(false);setLoginFout(false);setWachtwoord("");}else setLoginFout(true);}
  async function deleteDeelnemer(id){if(!window.confirm("Verwijderen?"))return;await dbVerwijderen("deelnemers",id);setDeelnemers(prev=>prev.filter(d=>d.id!==id));}
  function startEdit(d){setEditForm(JSON.parse(JSON.stringify(d)));setEditId(d.id);}
  async function saveEdit(){setOpslaan(true);await dbBijwerken("deelnemers",editId,{...editForm,spelers:JSON.stringify(editForm.spelers)});setDeelnemers(prev=>prev.map(d=>d.id===editId?{...editForm}:d));setEditId(null);setEditForm(null);setOpslaan(false);}
  function updS(si,f,v){const u=JSON.parse(JSON.stringify(editForm));u.spelers[si][f]=v;setEditForm(u);}
  function updStat(si,stat,val){const u=JSON.parse(JSON.stringify(editForm));if(!u.spelers[si].stats)u.spelers[si].stats={};u.spelers[si].stats[stat]=val;setEditForm(u);}
  function editSys(sys){const u=JSON.parse(JSON.stringify(editForm));u.systeem=sys;u.spelers=maakSpelers(sys);setEditForm(u);}

  const TABS=[["ranglijst","🏆 Ranglijst"],["wedstrijden","📅 Wedstrijden"],["uitslagen","⚽ Uitslagen"],["deelnemers","👥 Teams"],["inschrijven","✍️ Inschrijven"],...(isAdmin?[["beheer","⚙️ Beheer"]]:[])] ;

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a"}}>
      {toonLogin&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#111",border:`1px solid ${ORANJE}44`,borderRadius:16,padding:32,width:320}}>
          <div className="bebas" style={{fontSize:26,marginBottom:4,color:ORANJE}}>Beheerder Login</div>
          <input type="password" placeholder="Wachtwoord" value={wachtwoord} onChange={e=>{setWachtwoord(e.target.value);setLoginFout(false);}} onKeyDown={e=>e.key==="Enter"&&login()} style={{...IS,marginBottom:8}}/>
          {loginFout&&<div style={{color:"#ef4444",fontSize:13,marginBottom:10}}>Verkeerd wachtwoord</div>}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={login} style={{...BG,flex:1}}>Inloggen</button>
            <button onClick={()=>{setToonLogin(false);setWachtwoord("");setLoginFout(false);}} style={BX}>Annuleer</button>
          </div>
        </div>
      </div>)}

      {/* HERO HEADER */}
      <HeroHeader deelnemers={deelnemers}/>

      {/* Beheer knop + TABS */}
      <div style={{background:"#0d0d0d",borderBottom:"1px solid #111",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px"}}>
          <div style={{display:"flex",overflowX:"auto"}}>
            {TABS.map(([key,label])=>(<button key={key} onClick={()=>setTab(key)} style={{padding:"12px 16px",border:"none",background:"none",color:tab===key?ORANJE:"#555",fontWeight:tab===key?700:400,borderBottom:tab===key?`3px solid ${ORANJE}`:"3px solid transparent",fontSize:13,whiteSpace:"nowrap",flexShrink:0}}>{label}</button>))}
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0,paddingLeft:8}}>
            {isAdmin&&<button onClick={()=>exportCSV(deelnemers)} style={{...BG,padding:"6px 12px",fontSize:11}}>Excel</button>}
            {isAdmin?<button onClick={()=>{setIsAdmin(false);setTab("ranglijst");}} style={{...BX,color:"#ef4444",fontSize:11,padding:"6px 10px"}}>Uitloggen</button>:<button onClick={()=>setToonLogin(true)} style={{...BX,fontSize:11,padding:"6px 10px"}}>🔐</button>}
          </div>
        </div>
      </div>

      {laden&&<div style={{textAlign:"center",padding:80,color:"#333",letterSpacing:3}}>LADEN...</div>}

      {!laden&&<div style={{maxWidth:960,margin:"0 auto",padding:"24px 16px"}}>
        {tab==="ranglijst"&&<RanglijstTab deelnemers={deelnemers} isAdmin={isAdmin}/>}
        {tab==="wedstrijden"&&<WedstrijdenTab isAdmin={isAdmin}/>}
        {tab==="uitslagen"&&<UitslagenTab/>}

        {tab==="deelnemers"&&(<div>
          <div style={{marginBottom:16,fontSize:11,color:"#444",letterSpacing:3}}>{deelnemers.length} TEAMS</div>
          {deelnemers.map(d=>(<div key={d.id} style={{marginBottom:8,border:"1px solid #1e1e1e",borderRadius:12,background:"#111",padding:"13px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15}}>{d.naam}</div>
              <div style={{fontSize:12,color:"#555"}}>{d.teamnaam||"-"} · <span style={{color:ORANJE}}>{d.systeem}</span></div>
              <div style={{fontSize:11,color:"#333",marginTop:3}}>{(d.spelers||[]).filter(s=>s.naam).map(s=>`${s.naam} (${s.land})`).join(", ")||"Geen spelers"}</div>
            </div>
            <div className="bebas" style={{fontSize:22,color:ORANJE,flexShrink:0}}>{calcTotal(d)} pt</div>
          </div>))}
          {deelnemers.length===0&&<div style={{color:"#333",textAlign:"center",padding:60}}>Nog geen teams.</div>}
        </div>)}

        {tab==="inschrijven"&&<Inschrijfformulier onInschrijven={laadData}/>}

        {tab==="beheer"&&isAdmin&&(<div>
          <div style={{marginBottom:20,padding:16,background:"#1a0a00",border:`1px solid ${ORANJE}44`,borderRadius:12}}>
            <div className="bebas" style={{fontSize:20,color:ORANJE,marginBottom:4}}>Beheerderspaneel</div>
          </div>
          {deelnemers.map(d=>(<div key={d.id} style={{marginBottom:10,border:"1px solid #1e1e1e",borderRadius:12,overflow:"hidden",background:"#111"}}>
            {editId===d.id?(<div style={{padding:18}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:14,color:ORANJE}}>Bewerken: {d.naam}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                {[["naam","Naam"],["teamnaam","Team"],["email","Email"]].map(([f,ph])=>(<div key={f}><div style={{fontSize:11,color:"#555",marginBottom:4}}>{ph}</div><input value={editForm[f]||""} onChange={e=>setEditForm({...editForm,[f]:e.target.value})} style={IS}/></div>))}
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"#555",marginBottom:8}}>Systeem</div>
                <div style={{display:"flex",gap:8}}>{Object.keys(SYSTEMEN).map(sys=>(<button key={sys} onClick={()=>editSys(sys)} style={{flex:1,padding:"10px 0",border:`2px solid ${editForm.systeem===sys?ORANJE:"#222"}`,background:editForm.systeem===sys?`${ORANJE}22`:"#0d0d0d",color:editForm.systeem===sys?ORANJE:"#555",borderRadius:8,fontWeight:700,fontSize:15}}>{sys}</button>))}</div>
              </div>
              {editForm.spelers.map((s,si)=>(<div key={si} style={{marginBottom:10,background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:10,padding:12}}>
                <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
                  <PosBadge positie={s.positie}/>
                  <select value={s.land} onChange={e=>updS(si,"land",e.target.value)} style={{...IS,flex:1,minWidth:100,fontSize:13}}>
                    <option value="">Land...</option>
                    {WK_LANDEN.map(l=>(<option key={l} value={l}>{l}</option>))}
                  </select>
                  <input placeholder="Naam" value={s.naam||""} onChange={e=>updS(si,"naam",e.target.value)} style={{...IS,flex:1,minWidth:100}}/>
                </div>
                <StatEditor speler={s} onChange={(stat,val)=>updStat(si,stat,val)}/>
                <div style={{marginTop:8,fontSize:13,color:ORANJE,fontWeight:700}}>Punten: {calcPoints(s)}</div>
              </div>))}
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button onClick={saveEdit} disabled={opslaan} style={{...BG,flex:1,opacity:opslaan?0.6:1}}>{opslaan?"Opslaan...":"Opslaan"}</button>
                <button onClick={()=>{setEditId(null);setEditForm(null);}} style={BX}>Annuleren</button>
              </div>
            </div>):(<div style={{display:"flex",alignItems:"center",padding:"13px 16px",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14}}>{d.naam}</div>
                <div style={{fontSize:12,color:"#555"}}>{d.teamnaam||"-"} · {d.email||""}</div>
              </div>
              <div className="bebas" style={{fontSize:20,color:ORANJE,flexShrink:0}}>{calcTotal(d)} pt</div>
              <button onClick={()=>startEdit(d)} style={BX}>Punten</button>
              <button onClick={()=>deleteDeelnemer(d.id)} style={{...BX,color:"#ef4444"}}>X</button>
            </div>)}
          </div>))}
        </div>)}
      </div>}

      <div style={{textAlign:"center",padding:"30px 20px",borderTop:"1px solid #111",marginTop:40}}>
        <div style={{fontSize:11,color:"#222",letterSpacing:2}}>WK 2026 POULE</div>
        {!deadlineVerstreken()&&<div style={{fontSize:12,color:"#333",marginTop:6}}>Inschrijving sluit: <span style={{color:ORANJE}}>{formatDeadline()}</span></div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
