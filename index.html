<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

// ═══════════════════════════════════════════════════════════════

const SUPABASE_URL = "https://ucqimrpcndzepgofwdvt.supabase.co";
const SUPABASE_KEY = "sb_publishable_aZOBdvvKzklrnnq4-b2c7A_MfPRjYV8";

const DEADLINE = new Date("2026-06-10T23:59:59+02:00");
const WC_START = new Date("2026-06-11T18:00:00+02:00");

const STORAGE_BASE = SUPABASE_URL + "/storage/v1/object/public/fotos/";
const PHOTOS = {
  virgil: STORAGE_BASE + "virgil-removebg-preview.png",

// ═══════════════════════════════════════════════════════════════
//  SUPABASE REST (direct fetch - no library dependency)
// ═══════════════════════════════════════════════════════════════
const DB = SUPABASE_URL + "/rest/v1";
const HDR = {
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY
};

async function dbLees() {
  try {
    const r = await fetch(DB + "/deelnemers?select=*&order=id", { headers: HDR });
    if (!r.ok) return [];
    const data = await r.json();
    return data.map(d => ({
      ...d,
      spelers: typeof d.spelers === "string" ? (function(){ try { return JSON.parse(d.spelers); } catch { return []; } })() : (d.spelers || [])
    }));
  } catch (e) { console.error("dbLees error", e); return []; }
}

async function dbToevoegen(deelnemer) {
  const body = {
    naam: deelnemer.naam,
    teamnaam: deelnemer.teamnaam || "",
    email: deelnemer.email || "",
    systeem: deelnemer.systeem || "",
    spelers: JSON.stringify(deelnemer.spelers || [])
  };
  const r = await fetch(DB + "/deelnemers", {
    method: "POST",
    headers: { ...HDR, "Prefer": "return=representation" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error("Insert mislukt: " + r.status);
  const data = await r.json();
  return Array.isArray(data) ? data[0] : data;
}

async function dbBijwerkenSpelers(id, spelers) {
  const r = await fetch(DB + "/deelnemers?id=eq." + id, {
    method: "PATCH",
    headers: { ...HDR, "Prefer": "return=representation" },
    body: JSON.stringify({ spelers: JSON.stringify(spelers) })
  });
  if (!r.ok) throw new Error("Update mislukt: " + r.status);
}

// ═══════════════════════════════════════════════════════════════
//  TIME HELPERS
// ═══════════════════════════════════════════════════════════════
function nlLocalToDate(dateStr, timeStr) {
  const [Y,M,D] = dateStr.split("-").map(Number);
  const [h,mi] = timeStr.split(":").map(Number);
  const guess = Date.UTC(Y, M-1, D, h, mi);
  const asNL = new Date(guess).toLocaleString("en-US", { timeZone: "Europe/Amsterdam" });
  const asUTC = new Date(guess).toLocaleString("en-US", { timeZone: "UTC" });
  const diff = new Date(asNL).getTime() - new Date(asUTC).getTime();
  return new Date(guess - diff);
}

function formatDateLocalized(dateStr, timeStr, lang, tz) {
  const d = nlLocalToDate(dateStr, timeStr);
  const useTz = tz || (LANGUAGES.find(l => l.code === lang) || LANGUAGES[0]).tz;
  const dateFmt = new Intl.DateTimeFormat(lang === "ar" ? "ar-SA" : lang, {
    timeZone: useTz, weekday: "short", day: "2-digit", month: "short"
  });
  const timeFmt = new Intl.DateTimeFormat(lang === "ar" ? "ar-SA" : lang, {
    timeZone: useTz, hour: "2-digit", minute: "2-digit", hour12: false
  });
  return { dateLabel: dateFmt.format(d), timeLabel: timeFmt.format(d), dateObj: d };
}

// ═══════════════════════════════════════════════════════════════
//  PERSISTENCE HOOK
// ═══════════════════════════════════════════════════════════════
function usePersisted(key, init) {
  const [v, setV] = useState(function() {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  useEffect(function() { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
  return [v, setV];
}

//  CONTEXT
// ═══════════════════════════════════════════════════════════════
const AppCtx = createContext(null);
function useApp() { return useContext(AppCtx); }

function computeTotalPoints(p) {
  let spelers = p.spelers;
  if (typeof spelers === "string") { try { spelers = JSON.parse(spelers); } catch { return 0; } }
  if (!Array.isArray(spelers)) return 0;
  return spelers.reduce(function(sum, sp) { return sum + (Number(sp.punten) || 0); }, 0);
}

function App() {
  const [theme, setTheme] = usePersisted("wk26_theme", "dark");
  const [lang, setLang] = usePersisted("wk26_lang", "en");
  const [tz, setTz] = usePersisted("wk26_tz", "Europe/London");
  const [tab, setTab] = usePersisted("wk26_tab", "ranking");
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(true);

  const currentLang = LANGUAGES.find(function(l) { return l.code === lang; }) || LANGUAGES[0];
  const t = T[lang] || T.nl;

  useEffect(function() {
    document.body.setAttribute("data-theme", theme);
    document.body.setAttribute("dir", currentLang.dir);
    document.documentElement.setAttribute("lang", lang);
  }, [theme, lang, currentLang.dir]);

  const loadParticipants = useCallback(async function() {
    setLoading(true);
    const data = await dbLees();
    setParticipants(data);
    setLoading(false);
  }, []);

  useEffect(function() { loadParticipants(); }, [loadParticipants]);

  const ctx = { theme, setTheme, lang, setLang, tz, setTz, currentLang, t, participants, reloadParticipants: loadParticipants, loading };

  return (
    <AppCtx.Provider value={ctx}>
      <FloatingDecor />
      <Header />
      <Tabs active={tab} onChange={setTab} />
      <main className="main">
        {tab === "ranking" && <RankingTab />}
        {tab === "matches" && <MatchesTab />}
        {tab === "results" && <ResultsTab />}
        {tab === "teams" && <TeamsTab />}
        {tab === "register" && <RegisterTab />}
        {tab === "admin" && <AdminTab />}
      </main>
    </AppCtx.Provider>
  );
}

function RankingTab() {
  const { participants, t, loading } = useApp();
  const ranked = useMemo(function() {
    return participants.map(function(p) {
      return Object.assign({}, p, { totalPts: computeTotalPoints(p) });
    }).sort(function(a, b) { return b.totalPts - a.totalPts; });
  }, [participants]);

  if (loading) return <div className="spinner"></div>;
  if (ranked.length === 0) return (
    <div className="card">
      <div className="empty-state">
        <img src={PHOTOS.trophy} alt="" className="empty-state-photo" onError={function(e){e.target.style.display="none";}} />
        <div>{t.noParticipants}</div>
      </div>
    </div>
  );

  const first = ranked[0], second = ranked[1], third = ranked[2];

  return (
    <React.Fragment>
      {ranked.length >= 1 && (
        <div className="podium">
          {second ? <PodiumStep step={second} rank={2} cls="silver" /> : <div />}
          <PodiumStep step={first} rank={1} cls="gold" />
          {third ? <PodiumStep step={third} rank={3} cls="bronze" /> : <div />}
        </div>
      )}
      <div className="card">
        <div className="card-title">{t.tabs.ranking}</div>
        <div className="rank-list">
          {ranked.map(function(p, i) {
            return (
              <div className="rank-row" key={p.id}>
                <div className="rank-num">{i + 1}</div>
                <div className="rank-name">{p.naam}</div>
                <div className="rank-team">{p.teamnaam}</div>
                <div className="rank-pts">{p.totalPts}</div>
              </div>
            );
          })}
        </div>
      </div>
    </React.Fragment>
  );
}

function PodiumStep(props) {
  const { t } = useApp();
  const starPhoto = props.rank === 1 ? PHOTOS.messi : props.rank === 2 ? PHOTOS.mbappe : PHOTOS.ronaldo;
  const isWinner = props.rank === 1;
  // Trophy color filter per rank
  const trophyFilters = {
    1: "drop-shadow(0 4px 12px rgba(255,215,0,0.6)) saturate(1.3)", // gold - natural
    2: "grayscale(1) brightness(1.4) contrast(0.85) drop-shadow(0 4px 10px rgba(192,192,192,0.5))", // silver
    3: "sepia(1) saturate(2) hue-rotate(-15deg) brightness(0.85) drop-shadow(0 4px 10px rgba(176,141,87,0.5))" // bronze
  };
  return (
    <div className={"podium-step " + props.cls}>
      <img src={starPhoto} alt="" className="deco-photo" onError={function(e){e.target.style.display="none";}} />
      {isWinner && (
        <div style={{position:"absolute",top:6,left:6,fontSize:18,opacity:0.9,zIndex:2}}>🎉</div>
      )}
      {isWinner && (
        <div style={{position:"absolute",top:6,right:6,fontSize:18,opacity:0.9,zIndex:2}}>🎊</div>
      )}
      <div className="podium-trophy">
        <img
          src={PHOTOS.trophy}
          alt={"#" + props.rank}
          style={{height: isWinner ? 70 : 56, width:"auto", filter: trophyFilters[props.rank]}}
          onError={function(e){e.target.style.display="none";}}
        />
      </div>
      <div className="podium-rank">#{props.rank}</div>
      <div className="podium-name">{props.step.naam}</div>
      <div className="podium-team">{props.step.teamnaam}</div>

// ═══════════════════════════════════════════════════════════════
function ResultsTab() {
  const { t } = useApp();
  const [now, setNow] = useState(Date.now());
  useEffect(function() {
    const id = setInterval(function() { setNow(Date.now()); }, 1000);
    return function() { clearInterval(id); };
  }, []);

  const diff = WC_START.getTime() - now;
  const started = diff <= 0;
  const d = Math.max(0, Math.floor(diff / (1000*60*60*24)));
  const h = Math.max(0, Math.floor((diff / (1000*60*60)) % 24));
  const mi = Math.max(0, Math.floor((diff / (1000*60)) % 60));
  const s = Math.max(0, Math.floor((diff / 1000) % 60));

  return (
    <div className="countdown-wrap">
      <img src={PHOTOS.wcPhoto} alt="" className="countdown-wc-bg" onError={function(e){e.target.style.display="none";}} />
      <div className="countdown-label">{started ? t.started : t.countdownTo}</div>
      {!started && (
        <div className="countdown-grid">
          <div className="countdown-unit"><div className="countdown-num">{String(d).padStart(2,"0")}</div><div className="countdown-unit-label">{t.days}</div></div>
          <div className="countdown-unit"><div className="countdown-num">{String(h).padStart(2,"0")}</div><div className="countdown-unit-label">{t.hours}</div></div>
          <div className="countdown-unit"><div className="countdown-num">{String(mi).padStart(2,"0")}</div><div className="countdown-unit-label">{t.minutes}</div></div>
          <div className="countdown-unit"><div className="countdown-num">{String(s).padStart(2,"0")}</div><div className="countdown-unit-label">{t.seconds}</div></div>
        </div>
      )}
      <div style={{marginTop:24,color:"var(--fg-muted)",fontSize:13,position:"relative"}}>{t.resultsPage}</div>
    </div>
  );
}

  const f = FORMATIONS[props.system] || FORMATIONS["1-4-3-3"];

  const keepers = spelers.filter(function(s) { return s.positie === "keeper"; });
  const defs = spelers.filter(function(s) { return s.positie === "def"; });
  const mids = spelers.filter(function(s) { return s.positie === "mid"; });
  const atts = spelers.filter(function(s) { return s.positie === "att"; });
  const coach = spelers.filter(function(s) { return s.positie === "coach"; })[0];

  function Slot(ps) {
    return (
      <div className={"pos-slot " + (ps.sp ? "filled" : "")}>
        <div className="pos-slot-label">{ps.label}</div>
        {ps.sp ? (
          <React.Fragment>

          <div className="pos-slot-country" style={{opacity:0.5}}>—</div>

  return (
    <div className="squad-formation">
      <div className="pos-row">
        {atts.map(function(sp, i) { return <Slot key={"a"+i} sp={sp} label={t.pos.att} />; })}
        {atts.length === 0 && Array(f.att).fill(0).map(function(_, i) { return <Slot key={"ae"+i} label={t.pos.att} />; })}
      </div>
      <div className="pos-row">
        {mids.map(function(sp, i) { return <Slot key={"m"+i} sp={sp} label={t.pos.mid} />; })}
        {mids.length === 0 && Array(f.mid).fill(0).map(function(_, i) { return <Slot key={"me"+i} label={t.pos.mid} />; })}
      </div>
      <div className="pos-row">
        {defs.map(function(sp, i) { return <Slot key={"d"+i} sp={sp} label={t.pos.def} />; })}
        {defs.length === 0 && Array(f.def).fill(0).map(function(_, i) { return <Slot key={"de"+i} label={t.pos.def} />; })}
      </div>
      <div className="pos-row">
        {keepers.map(function(sp, i) { return <Slot key={"k"+i} sp={sp} label={t.pos.keeper} />; })}
        {keepers.length === 0 && <Slot label={t.pos.keeper} />}
      </div>
      {coach && (
        <div className="pos-row" style={{marginTop:12}}>
          <div className="pos-slot filled" style={{width:130,background:"#FFD700",color:"#18181B"}}>
            <div className="pos-slot-label">{t.pos.coach}</div>
            <div className="pos-slot-country">{coach.land}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  REGISTER
// ═══════════════════════════════════════════════════════════════
function RegisterTab() {
  const { t, participants, reloadParticipants } = useApp();
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ naam:"", teamnaam:"", email:"", systeem:"1-4-3-3" });
  const [spelers, setSpelers] = useState({ keeper:[null], def:[null,null,null,null], mid:[null,null,null], att:[null,null,null], coach:[null] });
  const [error, setError] = useState("");
  const [success, setSuccess] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [openPicker, setOpenPicker] = useState(null);

  const deadlinePassed = Date.now() > DEADLINE.getTime();
  const formation = FORMATIONS[form.systeem];

  const takenCountries = useMemo(function() {
    const s = new Set();
    participants.forEach(function(p) {
      let sp = p.spelers;
      if (typeof sp === "string") { try { sp = JSON.parse(sp); } catch { sp = []; } }
      if (Array.isArray(sp)) sp.forEach(function(x) { if (x && x.land) s.add(x.land); });
    });
    return s;
  }, [participants]);

  const selfTaken = useMemo(function() {
    const s = new Set();
    Object.values(spelers).forEach(function(arr) {
      arr.forEach(function(x) { if (x && x.land) s.add(x.land); });
    });
    return s;
  }, [spelers]);

  useEffect(function() {
    function resizeArr(arr, len) {
      const a = (arr || []).slice();
      while (a.length < len) a.push(null);
      return a.slice(0, len);
    }
    setSpelers(function(prev) {
      return {
        keeper: resizeArr(prev.keeper, formation.keeper),
        def:    resizeArr(prev.def, formation.def),
        mid:    resizeArr(prev.mid, formation.mid),
        att:    resizeArr(prev.att, formation.att),
        coach:  resizeArr(prev.coach, 1)
      };
    });
  }, [form.systeem, formation.keeper, formation.def, formation.mid, formation.att]);

  if (deadlinePassed) return <div className="card"><div className="empty-state" style={{color:"var(--orange)"}}>{t.deadlinePassed}</div></div>;
  if (success) return <div className="card"><div className="success">{t.successReg}</div></div>;

  function handleNext() {
    setError("");
    if (!form.naam.trim()) return setError("Vul je naam in");
    if (!form.teamnaam.trim()) return setError("Vul een teamnaam in");
    if (!form.email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) return setError("Geldig e-mailadres vereist");
    setStep(2);
  }

  function pickCountry(pos, index, land) {
    setSpelers(function(prev) {
      const next = Object.assign({}, prev);
      next[pos] = prev[pos].slice();
      next[pos][index] = { land: land, positie: pos, punten: 0 };
      return next;
    });
    setOpenPicker(null);
  }

  function removePick(pos, index) {
    setSpelers(function(prev) {
      const next = Object.assign({}, prev);
      next[pos] = prev[pos].slice();
      next[pos][index] = null;
      return next;
    });
  }

  async function handleSubmit() {
    setError("");
    const flat = [].concat(spelers.keeper, spelers.def, spelers.mid, spelers.att, spelers.coach);
    if (flat.some(function(x) { return !x; })) return setError(t.pickPlayers);

    setSubmitting(true);
    try {
      await dbToevoegen({
        naam: form.naam.trim(),
        teamnaam: form.teamnaam.trim(),
        email: form.email.trim(),
        systeem: form.systeem,
        spelers: flat
      });
      setSuccess(true);
      await reloadParticipants();
    } catch (e) {
      console.error(e);
      setError("Fout bij inschrijven: " + (e.message || "onbekend"));
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div className="card register-card">
      <img src={PHOTOS.yamal} alt="" className="deco-photo" onError={function(e){e.target.style.display="none";}} />
      <div className="step-indicator">
        <div className={"step-dot " + (step >= 1 ? "active" : "")}>1</div>
        <div className={"step-line " + (step >= 2 ? "active" : "")}></div>
        <div className={"step-dot " + (step >= 2 ? "active" : "")}>2</div>
      </div>
      <div style={{fontSize:13,color:"var(--fg-muted)",marginBottom:14}}>
        {t.deadlineBefore} <strong style={{color:"var(--orange)"}}>10 juni 2026</strong>
      </div>

      {step === 1 && (
        <React.Fragment>
          <div className="card-title">{t.register1}</div>
          <label>{t.name}</label>
          <input value={form.naam} onChange={function(e){setForm(Object.assign({}, form, {naam:e.target.value}));}} />
          <label>{t.teamName}</label>
          <input value={form.teamnaam} onChange={function(e){setForm(Object.assign({}, form, {teamnaam:e.target.value}));}} />
          <label>{t.email}</label>
          <input type="email" value={form.email} onChange={function(e){setForm(Object.assign({}, form, {email:e.target.value}));}} />
          <label>{t.system}</label>
          <select value={form.systeem} onChange={function(e){setForm(Object.assign({}, form, {systeem:e.target.value}));}}>
            {Object.keys(FORMATIONS).map(function(k) { return <option key={k} value={k}>{k}</option>; })}
          </select>
          {error && <div className="error">{error}</div>}
          <button className="btn" onClick={handleNext}>{t.next} →</button>
        </React.Fragment>
      )}

      {step === 2 && (
        <React.Fragment>
          <div className="card-title">{t.register2} — {form.systeem}</div>
          <div style={{fontSize:13,color:"var(--fg-muted)",marginBottom:10}}>{t.pickPlayers}</div>

          {["att","mid","def","keeper","coach"].map(function(pos) {
            const posLabel = t.pos[pos];
            const arr = spelers[pos] || [];
            const filled = arr.filter(Boolean).length;
            return (
              <div key={pos} style={{marginBottom:18}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:18,color:"var(--orange)",marginBottom:8}}>
                  {posLabel}
                  <span style={{color:"var(--fg-muted)",fontSize:13,marginLeft:8}}>({filled} / {arr.length})</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:8}}>
                  {arr.map(function(x, i) {
                    return (
                      <button
                        key={i}
                        type="button"
                        className="country-btn"
                        style={x ? {background:"var(--orange)",color:"white",borderColor:"var(--orange)"} : {}}
                        onClick={function() {
                          if (x) removePick(pos, i);
                          else setOpenPicker({ pos: pos, index: i });
                        }}
                      >
                        {x ? (<React.Fragment><span style={{fontSize:"1.2em",marginRight:4}}>{flag(x.land)}</span>{x.land} ✕</React.Fragment>) : ("+ " + t.selectCountry)}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {error && <div className="error">{error}</div>}
          <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
            <button className="btn btn-outline" onClick={function(){setStep(1);}}>← {t.back}</button>
            <button className="btn" onClick={handleSubmit} disabled={submitting}>
              {submitting ? "…" : t.submit}
            </button>
          </div>
        </React.Fragment>
      )}

      {openPicker && (
        <CountryPicker
          taken={new Set([].concat(Array.from(takenCountries), Array.from(selfTaken)))}
          onPick={function(land) { pickCountry(openPicker.pos, openPicker.index, land); }}
          onClose={function() { setOpenPicker(null); }}
        />
      )}
    </div>
  );
}

function CountryPicker(props) {
  const { t } = useApp();
  const [q, setQ] = useState("");
  const filtered = ALL_COUNTRIES.filter(function(c) { return c.toLowerCase().indexOf(q.toLowerCase()) !== -1; });

  return (
    <div className="modal-backdrop" onClick={props.onClose}>
      <div className="modal" onClick={function(e){e.stopPropagation();}}>
        <div className="modal-title">{t.selectCountry}</div>
        <input placeholder="🔍" value={q} onChange={function(e){setQ(e.target.value);}} autoFocus />
        <div className="country-grid">
          {filtered.map(function(c) {
            const isTaken = props.taken.has(c);
            return (
              <button
                key={c}
                className="country-btn"
                disabled={isTaken}
                title={isTaken ? t.countryTaken : ""}
                onClick={function(){ if (!isTaken) props.onPick(c); }}
              >
                <span style={{fontSize:"1.2em",marginRight:4}}>{flag(c)}</span>{c}
              </button>
            );
          })}
        </div>
        <div style={{marginTop:12,textAlign:"end"}}>
          <button className="btn btn-outline" onClick={props.onClose}>{t.back}</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════════════════════
function AdminTab() {
  const { t, participants, reloadParticipants } = useApp();
  const [authed, setAuthed] = usePersisted("wk26_admin", false);
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(null);
  const [savedMsg, setSavedMsg] = useState(null);

  function tryLogin() {
    if (pw === ADMIN_WACHTWOORD) { setAuthed(true); setErr(""); }
    else setErr(t.wrongPw);
  }

  if (!authed) {
    return (
      <div className="card">
        <div className="card-title">{t.adminLogin}</div>
        <label>{t.password}</label>
        <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter") tryLogin();}} />
        {err && <div className="error">{err}</div>}
        <button className="btn" onClick={tryLogin}>{t.login}</button>
      </div>
    );
  }

  async function savePoints(p, newSpelers) {
    setSaving(p.id);
    try {
      await dbBijwerkenSpelers(p.id, newSpelers);
      setSavedMsg(p.id);
      setTimeout(function() { setSavedMsg(null); }, 2000);
      await reloadParticipants();
    } catch (e) {
      alert("Fout: " + e.message);
    } finally {
      setSaving(null);
    }
  }

  function exportExcel() {
    const rows = [];
    participants.forEach(function(p) {
      let sp = p.spelers;
      if (typeof sp === "string") { try { sp = JSON.parse(sp); } catch { sp = []; } }
      if (!Array.isArray(sp)) sp = [];
      const totalPts = sp.reduce(function(s, x) { return s + (Number(x.punten) || 0); }, 0);
      rows.push({
        Naam: p.naam,
        Teamnaam: p.teamnaam,
        Email: p.email,
        Systeem: p.systeem,
        TotaalPunten: totalPts,
        Spelers: sp.map(function(x) { return x.positie + ":" + x.land + "(" + (x.punten || 0) + ")"; }).join(" | ")
      });
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "WK2026");
    XLSX.writeFile(wb, "wk2026_poule.xlsx");
  }

  return (
    <div className="card">
      <div className="card-title" style={{justifyContent:"space-between",display:"flex",flexWrap:"wrap",gap:10}}>
        <span>{t.adminPanel}</span>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={exportExcel}>📊 {t.exportExcel}</button>
          <button className="btn btn-outline" onClick={function(){setAuthed(false);}}>{t.logout}</button>
        </div>
      </div>
      {participants.length === 0 ? (
        <div className="empty-state">{t.noParticipants}</div>
      ) : (
        participants.map(function(p) {
          return (
            <AdminRow
              key={p.id}
              participant={p}
              onSave={savePoints}
              saving={saving === p.id}
              saved={savedMsg === p.id}
            />
          );
        })
      )}
    </div>
  );
}

function AdminRow(props) {
  const { t } = useApp();
  let initial = props.participant.spelers;
  if (typeof initial === "string") { try { initial = JSON.parse(initial); } catch { initial = []; } }
  if (!Array.isArray(initial)) initial = [];

  const [local, setLocal] = useState(function() {
    return initial.map(function(x) { return Object.assign({}, x, { punten: Number(x.punten) || 0 }); });
  });

  useEffect(function() {
    setLocal(initial.map(function(x) { return Object.assign({}, x, { punten: Number(x.punten) || 0 }); }));
  }, [props.participant.id]);

  function updatePts(i, val) {
    setLocal(function(prev) {
      return prev.map(function(x, idx) {
        return idx === i ? Object.assign({}, x, { punten: Number(val) || 0 }) : x;
      });
    });
  }

  const total = local.reduce(function(s, x) { return s + (Number(x.punten) || 0); }, 0);

  return (
    <div className="group-card" style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontWeight:700}}>{props.participant.teamnaam}</div>
          <div style={{fontSize:12,color:"var(--fg-muted)"}}>{props.participant.naam} • {props.participant.systeem}</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span className="badge">Totaal: {total}</span>
          <button className="btn" onClick={function(){props.onSave(props.participant, local);}} disabled={props.saving}>
            {props.saving ? "…" : props.saved ? "✓ " + t.saved : t.save}
          </button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",gap:6}}>
        {local.map(function(sp, i) {
          const posLabel = t.pos[sp.positie] || sp.positie;
          return (
            <div key={i} className="admin-player">
              <span style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                <strong style={{color:"var(--orange)"}}>{posLabel}</strong>
                <span style={{color:"var(--fg-muted)"}}> · </span>
                <span style={{marginRight:4}}>{flag(sp.land)}</span>
                <span>{sp.land}</span>
              </span>
              <input
                type="number"
                className="admin-input-mini"
                value={sp.punten}
                onChange={function(e){updatePts(i, e.target.value);}}
              />
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
