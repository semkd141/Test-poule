// NL=CEST+2 in zomer, maar wedstrijden zijn in juni dus UTC+2 voor NL
// Alle wedstrijdtijden in de data zijn NL-tijd (UTC+2)
function convertTime(tijdNL, taal) {
  const [h, m] = tijdNL.split(":").map(Number);
  const nlOffset = 2; // CEST
  const targetOffset = { nl:2, en:1, es:-5, fr:2, pt:-3, ar:3 }[taal] || 2;
  let newH = h + (targetOffset - nlOffset);
  if (newH < 0) newH += 24;
  if (newH >= 24) newH -= 24;
  return `${String(newH).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function maakSpelers(sys){const s=SYSTEMEN[sys]||SYSTEMEN["1-4-3-3"];const l=[];["doelman","verdediger","middenvelder","aanvaller"].forEach(p=>{for(let i=0;i<s[p];i++)l.push({positie:p,naam:"",land:"",stats:{}});});l.push({positie:"coach",naam:"",land:"",stats:{}});return l;}
function calcPoints(s){const sc=POINTS[s.positie];if(!sc)return 0;return STATS.reduce((sum,stat)=>{const v=(s.stats&&s.stats[stat])||0;const p=sc[stat];return typeof p==="number"?sum+v*p:sum;},0);}
function calcTotal(d){return(d.spelers||[]).reduce((sum,s)=>sum+calcPoints(s),0);}
function deadlineVerstreken(){return new Date()>INSCHRIJF_DEADLINE;}
function formatDeadline(){return INSCHRIJF_DEADLINE.toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"})+" om "+INSCHRIJF_DEADLINE.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});}
function formatDatum(d){return new Date(d).toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"});}
function exportCSV(dd){const s=[...dd].sort((a,b)=>calcTotal(b)-calcTotal(a));const r=[["Rang","Naam","Team","Email","Systeem","Punten"]];s.forEach((d,i)=>r.push([i+1,d.naam,d.teamnaam||"",d.email||"",d.systeem||"",calcTotal(d)]));const c=r.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");const b=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="WK2026_Poule.csv";a.click();URL.revokeObjectURL(u);}

function RanglijstTab({deelnemers,T,isDark,BG_CARD,BG_CARD2,TXT,TXT2,TXT3,BORDER}){
  const [expandId,setExpandId]=useState(null);
  const sorted=[...deelnemers].sort((a,b)=>calcTotal(b)-calcTotal(a));

    <div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1.1fr 1fr",gap:8,marginBottom:20}}>

                {teamFoto&&<img src={teamFoto} style={{position:"absolute",right:-8,bottom:0,height:"80%",objectFit:"contain",opacity:0.1,pointerEvents:"none"}} alt=""/>}
                <div style={{position:"relative",zIndex:1}}>

                  <div style={{fontWeight:700,fontSize:isFirst?14:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.naam}</div>
                  <div style={{fontSize:10,color:"#555",marginBottom:6}}>{d.teamnaam||"-"}</div>

      {sorted.map((d,i)=>{
        const pts=calcTotal(d);const open=expandId===d.id;
        const mc=i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":"#1e1e1e";
        const gr=groep(d.spelers);
        const teamFoto=(d.spelers||[]).map(s=>LAND_FOTO[s.land]).find(Boolean);
        return(
          <div key={d.id} style={{marginBottom:6,border:`1px solid ${open?ORANJE+"44":"#1e1e1e"}`,borderRadius:12,overflow:"hidden",background:"#111",position:"relative"}}>
            {teamFoto&&<img src={teamFoto} style={{position:"absolute",right:60,top:0,height:"100%",objectFit:"contain",opacity:0.05,pointerEvents:"none"}} alt=""/>}
            <div onClick={()=>setExpandId(open?null:d.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",position:"relative",zIndex:1}}>
              <div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:mc,color:i<3?"#000":"#666",fontWeight:800,fontSize:12,flexShrink:0}}>{i+1}</div>

                <div className="bebas" style={{fontSize:22,color:i===0?ORANJE:"#fff",letterSpacing:1}}>{pts}</div>
                <div style={{fontSize:9,color:"#444",letterSpacing:1}}>PUNTEN</div>
              </div>
              <div style={{color:"#333",fontSize:11}}>{open?"▲":"▼"}</div>
            </div>
            {open&&(
              <div style={{borderTop:"1px solid #1a1a1a",padding:"12px 14px",background:"#0d0d0d"}}>
                {["doelman","verdediger","middenvelder","aanvaller","coach"].map(pos=>{const sp=gr[pos];if(!sp||!sp.length)return null;return(
                  <div key={pos} style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:POS_COLOR[pos],textTransform:"uppercase",letterSpacing:2,marginBottom:6,fontWeight:700}}>{pos}</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:6}}>
                      {sp.map((s,si)=>{const foto=LAND_FOTO[s.land];return(
                        <div key={si} style={{background:"#111",borderRadius:8,padding:"8px 10px",border:"1px solid #1a1a1a",position:"relative",overflow:"hidden"}}>
                          {foto&&<img src={foto} style={{position:"absolute",right:-6,bottom:0,height:"75%",objectFit:"contain",opacity:0.12,pointerEvents:"none"}} alt=""/>}
                          <div style={{position:"relative",zIndex:1}}>
                            <div style={{fontWeight:600,fontSize:13}}>{s.naam||"-"}</div>
                            <div style={{fontSize:11,color:"#444",marginBottom:3}}>{s.land||""}</div>
                            <div className="bebas" style={{fontSize:17,color:ORANJE}}>{calcPoints(s)} pt</div>
                          </div>
                        </div>
                      );})}
                    </div>
                  </div>
                );})}
              </div>
            )}
          </div>
        );
      })}
      {sorted.length===0&&<div style={{color:"#333",textAlign:"center",padding:60}}>Nog geen deelnemers.</div>}
    </div>
  );
}

function Inschrijfformulier({onInschrijven,T,isDark,BG_CARD,BG_CARD2,TXT,TXT2,TXT3,BORDER,BORDER2,IS_T}){
  const [form,setForm]=useState({naam:"",teamnaam:"",email:"",systeem:"1-4-3-3",spelers:maakSpelers("1-4-3-3")});
  const [stap,setStap]=useState(1);const [bezig,setBezig]=useState(false);const [fout,setFout]=useState("");
  function setSys(sys){setForm({...form,systeem:sys,spelers:maakSpelers(sys)});}
  function setSpeler(si,f,v){const sp=[...form.spelers];sp[si]={...sp[si],[f]:v};setForm({...form,spelers:sp});}
  const gLanden=form.spelers.filter(s=>s.land).map(s=>s.land);
  async function versturen(){
    if(form.spelers.some(s=>!s.naam.trim()||!s.land.trim())){setFout("Vul alle spelers en landen in.");return;}
    const landen=form.spelers.map(s=>s.land);if(new Set(landen).size!==landen.length){setFout("Land dubbel gebruikt!");return;}
    setBezig(true);setFout("");
    try{const n=await dbToevoegen("deelnemers",{naam:form.naam,teamnaam:form.teamnaam,email:form.email,systeem:form.systeem,spelers:JSON.stringify(form.spelers)});
    if(n&&n.id){setStap(3);onInschrijven();}else setFout("Er ging iets mis.");}catch(e){setFout("Verbindingsfout.");}setBezig(false);
  }
  if(deadlineVerstreken())return(<div style={{textAlign:"center",padding:50}}><div style={{fontSize:40,marginBottom:12}}>🔒</div><div className="bebas" style={{fontSize:26,color:ORANJE,marginBottom:6}}>Inschrijving gesloten</div><div style={{color:"#666",fontSize:13}}>{formatDeadline()}</div></div>);
  if(stap===3)return(<div style={{textAlign:"center",padding:50}}><div style={{fontSize:48,marginBottom:12}}>🎉</div><div className="bebas" style={{fontSize:28,color:ORANJE,marginBottom:6}}>Ingeschreven!</div><div style={{color:"#aaa",fontSize:14}}>Succes {form.naam}!</div></div>);
  return(
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <div style={{position:"relative",borderRadius:12,overflow:"hidden",marginBottom:20,background:"#111",border:"1px solid #222",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
        <img src={IMG("world_cup-removebg-preview.png")} style={{height:50,objectFit:"contain",flexShrink:0,filter:`drop-shadow(0 0 6px ${ORANJE}55)`}} alt=""/>
        <div><div className="bebas" style={{fontSize:18,color:ORANJE,letterSpacing:2}}>Schrijf je in!</div><div style={{fontSize:12,color:"#555"}}>Deadline: {formatDeadline()}</div></div>
        <img src={IMG("virgil-removebg-preview.png")} style={{position:"absolute",right:-8,bottom:0,height:"100%",objectFit:"contain",opacity:0.08,pointerEvents:"none"}} alt=""/>
      </div>
      <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid #222",marginBottom:20}}>
        {["1. Gegevens","2. Spelers"].map((l,i)=>(<div key={i} style={{flex:1,padding:"11px 0",textAlign:"center",fontSize:13,fontWeight:700,background:stap===i+1?ORANJE:"#111",color:stap===i+1?"#fff":"#444",borderRight:i===0?"1px solid #222":"none"}}>{l}</div>))}
      </div>
      {stap===1&&(<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:12,color:"#666",marginBottom:4}}>Naam *</div><input placeholder="Jan Janssen" value={form.naam} onChange={e=>setForm({...form,naam:e.target.value})} style={IS}/></div>
          <div><div style={{fontSize:12,color:"#666",marginBottom:4}}>Team naam *</div><input placeholder="De Oranjeboys" value={form.teamnaam} onChange={e=>setForm({...form,teamnaam:e.target.value})} style={IS}/></div>
        </div>
        <div style={{marginBottom:16}}><div style={{fontSize:12,color:"#666",marginBottom:4}}>E-mail *</div><input placeholder="jouw@email.nl" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} style={IS}/></div>
        <div style={{marginBottom:8}}><div style={{fontSize:12,color:"#666",marginBottom:8}}>Spelsysteem *</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
            {Object.keys(SYSTEMEN).map(sys=>(<button key={sys} onClick={()=>setSys(sys)} style={{padding:"12px 0",border:`2px solid ${form.systeem===sys?ORANJE:"#222"}`,background:form.systeem===sys?`${ORANJE}22`:"#111",color:form.systeem===sys?ORANJE:"#555",borderRadius:8,fontWeight:800,fontSize:16}}>{sys}</button>))}
          </div>
        </div>
        <button onClick={()=>{if(!form.naam.trim()||!form.teamnaam.trim()||!form.email.trim()){setFout("Vul alle velden in.");return;}setFout("");setStap(2);}} style={{...BG,width:"100%",marginTop:14,padding:"12px 0",fontSize:15}}>Volgende</button>
        {fout&&<div style={{color:"#ef4444",fontSize:13,marginTop:8,textAlign:"center"}}>{fout}</div>}
      </div>)}
      {stap===2&&(<div>
        <div style={{marginBottom:12,padding:10,background:"#1a1a1a",borderRadius:8,border:"1px solid #222",fontSize:13,color:"#aaa"}}>1 speler per land · elk land max 1x</div>
        {form.spelers.map((s,si)=>(<div key={si} style={{marginBottom:8,background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:10}}>
          <div style={{marginBottom:6}}><PosBadge positie={s.positie}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div><div style={{fontSize:11,color:"#555",marginBottom:3}}>Land</div>
              <select value={s.land} onChange={e=>setSpeler(si,"land",e.target.value)} style={{...IS,fontSize:13}}>
                <option value="">Kies land...</option>
                {WK_LANDEN.map(l=>(<option key={l} value={l} disabled={gLanden.includes(l)&&s.land!==l}>{gLanden.includes(l)&&s.land!==l?"(bezet) ":""}{l}</option>))}
              </select>
            </div>
            <div><div style={{fontSize:11,color:"#555",marginBottom:3}}>{s.positie==="coach"?"Coach":"Speler"}</div><input placeholder={s.positie==="coach"?"bijv. Koeman":"bijv. Van Dijk"} value={s.naam} onChange={e=>setSpeler(si,"naam",e.target.value)} style={IS}/></div>
          </div>
        </div>))}
        {fout&&<div style={{color:"#ef4444",fontSize:13,margin:"8px 0",textAlign:"center",padding:"8px",background:"#ef444422",borderRadius:8}}>{fout}</div>}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={()=>{setFout("");setStap(1);}} style={{...BX,flexShrink:0}}>Terug</button>
          <button onClick={versturen} disabled={bezig} style={{...BG,flex:1,padding:"12px 0",fontSize:14,opacity:bezig?0.7:1}}>{bezig?"Bezig...":"Team inschrijven"}</button>
        </div>
      </div>)}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("ranglijst");
  const [deelnemers,setDeelnemers]=useState([]);
  const [laden,setLaden]=useState(true);
  const [opslaan,setOpslaan]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [toonLogin,setToonLogin]=useState(false);
  const [wachtwoord,setWachtwoord]=useState("");
  const [loginFout,setLoginFout]=useState(false);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState(null);
  const [thema,setThema]=useState(()=>localStorage.getItem("wk-thema")||"donker");
  const [taal,setTaal]=useState(()=>localStorage.getItem("wk-taal")||"nl");
  const T = TRANSLATIONS[taal] || TRANSLATIONS.nl;
  const isDark = thema==="donker";
  const BG_PAGE = isDark?"#0a0a0a":"#f5f5f5";
  const BG_CARD = isDark?"#111":"#ffffff";
  const BG_CARD2 = isDark?"#1a1a1a":"#f0f0f0";
  const BG_HEADER = isDark?"#0d0d0d":"#ffffff";
  const TXT = isDark?"#f0f0f0":"#111111";
  const TXT2 = isDark?"#aaa":"#555555";
  const TXT3 = isDark?"#555":"#999999";
  const BORDER = isDark?"#1e1e1e":"#e0e0e0";
  const BORDER2 = isDark?"#2a2a2a":"#d0d0d0";
  const IS_T = {background:BG_CARD2,border:`1px solid ${BORDER2}`,borderRadius:8,padding:"10px 12px",color:TXT,fontSize:14,width:"100%"};
  function toggleThema(){const n=thema==="donker"?"licht":"donker";setThema(n);localStorage.setItem("wk-thema",n);}
  function changeTaal(t){setTaal(t);localStorage.setItem("wk-taal",t);}

  useEffect(()=>{laadData();},[]);
  async function laadData(){setLaden(true);const data=await dbLees("deelnemers");setDeelnemers(data.map(d=>({...d,spelers:typeof d.spelers==="string"?JSON.parse(d.spelers):(d.spelers||[])})));setLaden(false);}
  function login(){if(wachtwoord===ADMIN_WACHTWOORD){setIsAdmin(true);setToonLogin(false);setLoginFout(false);setWachtwoord("");}else setLoginFout(true);}
  async function deleteD(id){if(!window.confirm("Verwijderen?"))return;await dbVerwijderen("deelnemers",id);setDeelnemers(p=>p.filter(d=>d.id!==id));}
  function startEdit(d){setEditForm(JSON.parse(JSON.stringify(d)));setEditId(d.id);}
  async function saveEdit(){setOpslaan(true);await dbBijwerken("deelnemers",editId,{...editForm,spelers:JSON.stringify(editForm.spelers)});setDeelnemers(p=>p.map(d=>d.id===editId?{...editForm}:d));setEditId(null);setEditForm(null);setOpslaan(false);}
  function updS(si,f,v){const u=JSON.parse(JSON.stringify(editForm));u.spelers[si][f]=v;setEditForm(u);}
  function updStat(si,stat,val){const u=JSON.parse(JSON.stringify(editForm));if(!u.spelers[si].stats)u.spelers[si].stats={};u.spelers[si].stats[stat]=val;setEditForm(u);}
  function editSys(sys){const u=JSON.parse(JSON.stringify(editForm));u.systeem=sys;u.spelers=maakSpelers(sys);setEditForm(u);}

  const TABS=[["ranglijst",T.ranglijst],["wedstrijden",T.wedstrijden],["uitslagen",T.uitslagen],["deelnemers",T.teams],["inschrijven",T.inschrijven],...(isAdmin?[["beheer",T.beheer]]:[])] ;
  const rtl = TRANSLATIONS[taal]?.rtl || false;

  return(
    <div style={{minHeight:"100vh",background:BG_PAGE,color:TXT,direction:rtl?"rtl":"ltr"}}>
      {toonLogin&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:BG_CARD,border:`1px solid ${ORANJE}44`,borderRadius:16,padding:28,width:"100%",maxWidth:320}}>
          <div className="bebas" style={{fontSize:24,marginBottom:4,color:ORANJE}}>{T.beheerderLogin}</div>
          <input type="password" placeholder={T.wachtwoord} value={wachtwoord} onChange={e=>{setWachtwoord(e.target.value);setLoginFout(false);}} onKeyDown={e=>e.key==="Enter"&&login()} style={{...IS_T,marginBottom:8}}/>
          {loginFout&&<div style={{color:"#ef4444",fontSize:13,marginBottom:8}}>❌</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={login} style={{...BG,flex:1}}>{T.inloggen}</button>
            <button onClick={()=>{setToonLogin(false);setWachtwoord("");setLoginFout(false);}} style={{background:BG_CARD2,color:TXT2,border:`1px solid ${BORDER2}`,borderRadius:8,padding:"9px 14px",fontSize:13,cursor:"pointer"}}>{T.annuleer}</button>
          </div>
        </div>
      </div>}

      <HeroHeader deelnemers={deelnemers} T={T} isDark={isDark} BG_CARD={BG_CARD} TXT={TXT} TXT2={TXT2} TXT3={TXT3}/>

      {/* TABS + controls */}
      <div style={{background:BG_HEADER,borderBottom:`1px solid ${BORDER}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            {TABS.map(([key,label])=>(<button key={key} onClick={()=>setTab(key)} style={{padding:"11px 14px",border:"none",background:"none",color:tab===key?ORANJE:TXT3,fontWeight:tab===key?700:400,borderBottom:tab===key?`3px solid ${ORANJE}`:"3px solid transparent",fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>{label}</button>))}
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0,paddingRight:8,alignItems:"center"}}>
            <select value={taal} onChange={e=>changeTaal(e.target.value)} style={{background:BG_CARD2,border:`1px solid ${BORDER2}`,color:TXT,borderRadius:6,padding:"4px 6px",fontSize:11,cursor:"pointer"}}>
              {Object.entries(TRANSLATIONS).map(([k,v])=>(<option key={k} value={k}>{v.flag}</option>))}
            </select>
            <button onClick={toggleThema} style={{background:BG_CARD2,border:`1px solid ${BORDER2}`,color:TXT,borderRadius:6,padding:"5px 8px",fontSize:14,cursor:"pointer"}}>{isDark?"☀️":"🌙"}</button>
            {isAdmin&&<button onClick={()=>exportCSV(deelnemers)} style={{...BG,padding:"5px 8px",fontSize:11}}>Excel</button>}
            {isAdmin?<button onClick={()=>{setIsAdmin(false);setTab("ranglijst");}} style={{background:BG_CARD2,color:"#ef4444",border:`1px solid ${BORDER2}`,borderRadius:6,padding:"5px 7px",fontSize:11,cursor:"pointer"}}>{T.uitloggen}</button>:<button onClick={()=>setToonLogin(true)} style={{background:BG_CARD2,color:TXT2,border:`1px solid ${BORDER2}`,borderRadius:6,fontSize:12,padding:"5px 8px",cursor:"pointer"}}>🔐</button>}
          </div>
        </div>
      </div>

      {laden&&<div style={{textAlign:"center",padding:60,color:TXT3,letterSpacing:3}}>{T.laden}</div>}
      {!laden&&<div style={{maxWidth:960,margin:"0 auto",padding:"20px 14px"}}>
        {tab==="ranglijst"&&<RanglijstTab deelnemers={deelnemers} T={T} isDark={isDark} BG_CARD={BG_CARD} BG_CARD2={BG_CARD2} TXT={TXT} TXT2={TXT2} TXT3={TXT3} BORDER={BORDER}/>}
        {tab==="wedstrijden"&&<WedstrijdenTab T={T} taal={taal} isDark={isDark} BG_CARD={BG_CARD} BG_CARD2={BG_CARD2} TXT={TXT} TXT2={TXT2} TXT3={TXT3} BORDER={BORDER}/>}
        {tab==="uitslagen"&&<UitslagenTab T={T} isDark={isDark} BG_CARD={BG_CARD} TXT={TXT} TXT2={TXT2} TXT3={TXT3}/>}
        {tab==="deelnemers"&&(<div>
          <div style={{marginBottom:14,fontSize:11,color:TXT3,letterSpacing:3}}>{deelnemers.length} {T.teams.replace("👥 ","")}</div>
          {deelnemers.map(d=>(<div key={d.id} style={{marginBottom:8,border:`1px solid ${BORDER}`,borderRadius:12,background:BG_CARD,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14}}>{d.naam}</div>
              <div style={{fontSize:12,color:"#555"}}>{d.teamnaam||"-"} · <span style={{color:ORANJE}}>{d.systeem}</span></div>
              <div style={{fontSize:11,color:"#333",marginTop:2}}>{(d.spelers||[]).filter(s=>s.naam).map(s=>`${s.naam} (${s.land})`).join(", ")||"Geen spelers"}</div>
            </div>
            <div className="bebas" style={{fontSize:20,color:ORANJE,flexShrink:0}}>{calcTotal(d)} pt</div>
          </div>))}
          {deelnemers.length===0&&<div style={{color:"#333",textAlign:"center",padding:60}}>Nog geen teams.</div>}
        </div>)}
        {tab==="inschrijven"&&<Inschrijfformulier onInschrijven={laadData} T={T} isDark={isDark} BG_CARD={BG_CARD} BG_CARD2={BG_CARD2} TXT={TXT} TXT2={TXT2} TXT3={TXT3} BORDER={BORDER} BORDER2={BORDER2} IS_T={IS_T}/>}
        {tab==="beheer"&&isAdmin&&(<div>
          <div style={{marginBottom:16,padding:14,background:isDark?"#1a0a00":"#fff8f0",border:`1px solid ${ORANJE}44`,borderRadius:12}}>
            <div className="bebas" style={{fontSize:18,color:ORANJE}}>{T.beheerderspaneel}</div>
          </div>
          {deelnemers.map(d=>(<div key={d.id} style={{marginBottom:10,border:"1px solid #1e1e1e",borderRadius:12,overflow:"hidden",background:"#111"}}>
            {editId===d.id?(<div style={{padding:16}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:ORANJE}}>Bewerken: {d.naam}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {[["naam","Naam"],["teamnaam","Team"],["email","Email"]].map(([f,ph])=>(<div key={f}><div style={{fontSize:11,color:"#555",marginBottom:3}}>{ph}</div><input value={editForm[f]||""} onChange={e=>setEditForm({...editForm,[f]:e.target.value})} style={IS}/></div>))}
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#555",marginBottom:6}}>Systeem</div>
                <div style={{display:"flex",gap:6}}>{Object.keys(SYSTEMEN).map(sys=>(<button key={sys} onClick={()=>editSys(sys)} style={{flex:1,padding:"8px 0",border:`2px solid ${editForm.systeem===sys?ORANJE:"#222"}`,background:editForm.systeem===sys?`${ORANJE}22`:"#0d0d0d",color:editForm.systeem===sys?ORANJE:"#555",borderRadius:8,fontWeight:700,fontSize:14}}>{sys}</button>))}</div>
              </div>
              {editForm.spelers.map((s,si)=>(<div key={si} style={{marginBottom:10,background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:10,padding:10}}>
                <div style={{display:"flex",gap:6,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
                  <PosBadge positie={s.positie}/>
                  <select value={s.land} onChange={e=>updS(si,"land",e.target.value)} style={{...IS,flex:1,minWidth:100,fontSize:13}}>
                    <option value="">Land...</option>
                    {WK_LANDEN.map(l=>(<option key={l} value={l}>{l}</option>))}
                  </select>
                  <input placeholder="Naam" value={s.naam||""} onChange={e=>updS(si,"naam",e.target.value)} style={{...IS,flex:1,minWidth:100}}/>
                </div>
                <StatEditor speler={s} onChange={(stat,val)=>updStat(si,stat,val)}/>
                <div style={{marginTop:6,fontSize:12,color:ORANJE,fontWeight:700}}>Punten: {calcPoints(s)}</div>
              </div>))}
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={saveEdit} disabled={opslaan} style={{...BG,flex:1,opacity:opslaan?0.6:1}}>{opslaan?"Opslaan...":"Opslaan"}</button>
                <button onClick={()=>{setEditId(null);setEditForm(null);}} style={BX}>Annuleren</button>
              </div>
            </div>):(<div style={{display:"flex",alignItems:"center",padding:"12px 14px",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14}}>{d.naam}</div>
                <div style={{fontSize:12,color:"#555"}}>{d.teamnaam||"-"} · {d.email||""}</div>
              </div>
              <div className="bebas" style={{fontSize:18,color:ORANJE,flexShrink:0}}>{calcTotal(d)} pt</div>
              <button onClick={()=>startEdit(d)} style={{...BX,fontSize:12,padding:"7px 10px"}}>Punten</button>
              <button onClick={()=>deleteD(d.id)} style={{...BX,color:"#ef4444",fontSize:12,padding:"7px 10px"}}>X</button>
            </div>)}
          </div>))}
          {deelnemers.length===0&&<div style={{color:"#333",textAlign:"center",padding:60}}>Nog geen deelnemers.</div>}
        </div>)}
      </div>}

      <div style={{textAlign:"center",padding:"24px 16px",borderTop:`1px solid ${BORDER}`,marginTop:30,background:BG_PAGE}}>
        <div style={{fontSize:10,color:TXT3,letterSpacing:2}}>{T.appTitle}</div>
        {!deadlineVerstreken()&&<div style={{fontSize:11,color:TXT2,marginTop:4}}>{T.deadline}: <span style={{color:ORANJE}}>{formatDeadline()}</span></div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
